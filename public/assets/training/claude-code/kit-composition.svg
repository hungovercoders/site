<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" role="img" aria-labelledby="kitCompTitle kitCompDesc">
  <title id="kitCompTitle">The Cinema Companion kit — how the pieces compose</title>
  <desc id="kitCompDesc">The kit's directory tree on the left, with arrows showing how Claude Code's features (context, commands, skills, hooks, MCP) compose with the data and the agent's tool surface to produce one workflow.</desc>

  <defs>
    <style>
      .panelTitle { font-family: 'Lora', Georgia, serif; font-size: 13px; font-weight: 700; fill: rgb(34, 41, 57); }
      .tree { font-family: 'JetBrains Mono', Menlo, Consolas, monospace; font-size: 11.5px; fill: rgb(34, 41, 57); }
      .note { font-family: 'Atkinson', system-ui, sans-serif; font-size: 11px; fill: rgb(96, 115, 159); }
      .pill { font-family: 'Atkinson', system-ui, sans-serif; font-size: 11px; font-weight: 600; fill: #fff; }
      .lead { font-family: 'Atkinson', system-ui, sans-serif; font-size: 12px; fill: rgb(34, 41, 57); }
    </style>
  </defs>

  <!-- Background -->
  <rect width="720" height="480" fill="#f8f9fb"/>

  <!-- Left panel: directory tree -->
  <rect x="20" y="20" width="320" height="440" rx="6" fill="#fff" stroke="rgb(229, 233, 240)"/>
  <text x="36" y="44" class="panelTitle">~/dev/learn.claude-code/</text>

  <!-- Tree -->
  <text x="36" y="74"  class="tree">├── films.json</text>
  <text x="36" y="92"  class="tree">├── pick-film.sh</text>
  <text x="36" y="110" class="tree">├── CLAUDE.md</text>
  <text x="36" y="128" class="tree">├── plans/</text>
  <text x="36" y="146" class="tree">│   └── mcp-feature.md</text>
  <text x="36" y="164" class="tree">├── scripts/</text>
  <text x="36" y="182" class="tree">│   └── build-cinema-db.sh</text>
  <text x="36" y="200" class="tree">├── .mcp.json</text>
  <text x="36" y="218" class="tree">├── .github/</text>
  <text x="36" y="236" class="tree">│   └── pull_request_template.md</text>
  <text x="36" y="254" class="tree">└── .claude/</text>
  <text x="36" y="272" class="tree">    ├── settings.json</text>
  <text x="36" y="290" class="tree">    ├── commands/</text>
  <text x="36" y="308" class="tree">    │   ├── film-pick.md</text>
  <text x="36" y="326" class="tree">    │   ├── film-suggest.md</text>
  <text x="36" y="344" class="tree">    │   └── checkpoint.md</text>
  <text x="36" y="362" class="tree">    ├── skills/</text>
  <text x="36" y="380" class="tree">    │   ├── add-film/</text>
  <text x="36" y="398" class="tree">    │   ├── pair/</text>
  <text x="36" y="416" class="tree">    │   └── audit/</text>
  <text x="36" y="434" class="tree">    └── hooks/</text>
  <text x="36" y="452" class="tree">        └── films-validate.sh</text>

  <!-- Right panel: composition annotations -->
  <text x="380" y="44" class="panelTitle">The pieces compose like this</text>

  <!-- Context card -->
  <rect x="380" y="60" width="320" height="68" rx="4" fill="#dbe4ff" stroke="rgb(35, 55, 255, 0.4)"/>
  <rect x="380" y="60" width="86" height="22" rx="4" fill="#2337ff"/>
  <text x="423" y="76" text-anchor="middle" class="pill">CONTEXT</text>
  <text x="394" y="100" class="lead">CLAUDE.md + AGENTS.md @ import</text>
  <text x="394" y="118" class="note">read on every session; encodes schema + "never do"</text>

  <!-- Commands + skills card -->
  <rect x="380" y="140" width="320" height="86" rx="4" fill="#e9deff" stroke="rgb(115, 80, 220, 0.4)"/>
  <rect x="380" y="140" width="118" height="22" rx="4" fill="#7350dc"/>
  <text x="439" y="156" text-anchor="middle" class="pill">COMMANDS + SKILLS</text>
  <text x="394" y="180" class="lead">/film-pick · /film-suggest · /add-film · /pair · /audit</text>
  <text x="394" y="198" class="note">tight allowed-tools per command; writes get</text>
  <text x="394" y="214" class="note">disable-model-invocation: true</text>

  <!-- Hook card -->
  <rect x="380" y="238" width="320" height="68" rx="4" fill="#d8f1e1" stroke="rgb(30, 166, 114, 0.4)"/>
  <rect x="380" y="238" width="60" height="22" rx="4" fill="#1ea672"/>
  <text x="410" y="254" text-anchor="middle" class="pill">HOOK</text>
  <text x="394" y="278" class="lead">films-validate.sh on PostToolUse</text>
  <text x="394" y="296" class="note">exits 2, agent reads stderr, fixes course on next turn</text>

  <!-- MCP card -->
  <rect x="380" y="318" width="320" height="68" rx="4" fill="#fee5d9" stroke="rgb(225, 110, 60, 0.4)"/>
  <rect x="380" y="318" width="58" height="22" rx="4" fill="#e16e3c"/>
  <text x="409" y="334" text-anchor="middle" class="pill">MCP</text>
  <text x="394" y="358" class="lead">cinema-db (SQLite) via .mcp.json</text>
  <text x="394" y="376" class="note">typed query tool; films.json stays the source of truth</text>

  <!-- The agent receives -->
  <rect x="380" y="398" width="320" height="58" rx="4" fill="rgb(34, 41, 57)"/>
  <text x="394" y="420" style="font-family:Atkinson,system-ui;font-size:12px;font-weight:600;fill:#fff;">The agent sees one composed workflow.</text>
  <text x="394" y="438" style="font-family:JetBrains Mono,monospace;font-size:11px;fill:rgb(178,190,220);">/add-film → skill writes → hook validates → done</text>
</svg>
