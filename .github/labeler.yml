# Auto-labeling rules for PRs based on changed files
# Used by: .github/workflows/ss-hygiene-auto-label-pr.yml
# Docs: https://github.com/actions/labeler

blog:
  - changed-files:
    - any-glob-to-any-file:
      - 'src/content/blog/**'
      - 'public/assets/2*-*-*/**'

training:
  - changed-files:
    - any-glob-to-any-file:
      - 'training-repos/**'
      - 'src/pages/training/**'
      - 'src/layouts/TrainingLesson.astro'

projects:
  - changed-files:
    - any-glob-to-any-file:
      - 'src/content/projects/**'
      - 'src/pages/projects.astro'

site:
  - changed-files:
    - any-glob-to-any-file:
      - 'src/components/**'
      - 'src/layouts/**'
      - 'src/pages/**'
      - 'src/styles/**'
      - 'astro.config.mjs'
      - 'src/consts.ts'
      - 'src/content.config.ts'

docs:
  - changed-files:
    - any-glob-to-any-file:
      - '*.md'
      - 'AGENTS.md'
      - 'CLAUDE.md'

ci:
  - changed-files:
    - any-glob-to-any-file:
      - '.github/**'
      - 'Taskfile.yml'
      - 'Taskfile.ss.yml'
      - '.ss/**'

deps:
  - changed-files:
    - any-glob-to-any-file:
      - 'package.json'
      - 'package-lock.json'

deploy:
  - changed-files:
    - any-glob-to-any-file:
      - 'wrangler.jsonc'
      - 'redirects/**'
      - 'scripts/**'
