<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" role="img" aria-labelledby="settingsTitle settingsDesc">
  <title id="settingsTitle">Settings hierarchy and rule precedence</title>
  <desc id="settingsDesc">The four settings.json layers (Enterprise, User, Project, Local) shown stacked with their file paths, and the rule precedence sieve on the right showing that deny wins, then ask, then allow within a category.</desc>

  <defs>
    <style>
      .h { font-family: 'Lora', Georgia, serif; font-size: 14px; font-weight: 700; fill: rgb(34, 41, 57); }
      .layer { font-family: 'Atkinson', system-ui, sans-serif; font-size: 13px; font-weight: 600; fill: #fff; }
      .scope { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; fill: rgba(255,255,255,0.85); }
      .body { font-family: 'Atkinson', system-ui, sans-serif; font-size: 11px; fill: rgb(96, 115, 159); }
      .path { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: rgb(34, 41, 57); }
      .ruleH { font-family: 'Lora', Georgia, serif; font-size: 13px; font-weight: 700; fill: #fff; }
    </style>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="rgb(96, 115, 159)"/>
    </marker>
  </defs>

  <rect width="720" height="440" fill="#f8f9fb"/>

  <!-- Left panel: the layers -->
  <text x="20" y="32" class="h">Where settings live (four layers, merged in order)</text>

  <!-- Enterprise -->
  <rect x="20" y="50" width="380" height="62" rx="5" fill="rgb(34, 41, 57)"/>
  <text x="34" y="72" class="layer">1. Enterprise (managed)</text>
  <text x="34" y="90" class="scope">/Library/Application Support/ClaudeCode/managed-settings.json</text>
  <text x="34" y="104" class="scope">macOS · org-wide policy · highest precedence on deny</text>

  <!-- User -->
  <rect x="20" y="120" width="380" height="62" rx="5" fill="#3556d4"/>
  <text x="34" y="142" class="layer">2. User</text>
  <text x="34" y="160" class="scope">~/.claude/settings.json</text>
  <text x="34" y="174" class="scope">your personal defaults across every project</text>

  <!-- Project -->
  <rect x="20" y="190" width="380" height="62" rx="5" fill="#7350dc"/>
  <text x="34" y="212" class="layer">3. Project</text>
  <text x="34" y="230" class="scope">&lt;repo&gt;/.claude/settings.json</text>
  <text x="34" y="244" class="scope">committed, team-shared, the cinema's load-bearing one</text>

  <!-- Local -->
  <rect x="20" y="260" width="380" height="62" rx="5" fill="rgb(96, 115, 159)"/>
  <text x="34" y="282" class="layer">4. Local (gitignored)</text>
  <text x="34" y="300" class="scope">&lt;repo&gt;/.claude/settings.local.json</text>
  <text x="34" y="314" class="scope">personal one-off overrides for this repo, not committed</text>

  <!-- Merge arrow on the side -->
  <path d="M 410 60 L 410 320" stroke="rgb(96, 115, 159)" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <text x="418" y="190" class="body">merge order</text>

  <!-- Footer note -->
  <text x="20" y="345" class="body">All four merge into the active session. Later layers override earlier ones —</text>
  <text x="20" y="361" class="body">except for deny, which is additive and never overridable.</text>

  <!-- Right panel: rule precedence -->
  <text x="455" y="32" class="h">Within a category, rules resolve</text>

  <!-- Sieve -->
  <rect x="450" y="50" width="250" height="56" rx="4" fill="#b54343"/>
  <text x="575" y="72" text-anchor="middle" class="ruleH">1. deny</text>
  <text x="575" y="92" text-anchor="middle" class="scope">first match wins. nothing overrides this.</text>

  <rect x="450" y="116" width="250" height="56" rx="4" fill="#d68f3a"/>
  <text x="575" y="138" text-anchor="middle" class="ruleH">2. ask</text>
  <text x="575" y="158" text-anchor="middle" class="scope">prompts you before allowing</text>

  <rect x="450" y="182" width="250" height="56" rx="4" fill="#1ea672"/>
  <text x="575" y="204" text-anchor="middle" class="ruleH">3. allow</text>
  <text x="575" y="224" text-anchor="middle" class="scope">silent pass-through if matched and no deny</text>

  <!-- Worked example -->
  <rect x="450" y="252" width="250" height="158" rx="5" fill="#fff" stroke="rgb(229, 233, 240)"/>
  <text x="463" y="270" class="h" font-size="12">Worked example: rm films.json</text>
  <text x="463" y="290" class="path">User:    allow Bash(rm:*)</text>
  <text x="463" y="306" class="path">Project: deny Bash(rm:*)</text>
  <text x="463" y="330" class="body">Deny wins — even though the user-level rule</text>
  <text x="463" y="344" class="body">allowed rm, the project's deny is additive and</text>
  <text x="463" y="358" class="body">cannot be overridden by allow.</text>
  <rect x="463" y="370" width="220" height="28" rx="3" fill="rgb(181, 67, 67)"/>
  <text x="573" y="389" text-anchor="middle" class="ruleH" font-size="12">Result: DENIED in this project</text>
</svg>
